<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>識字小天地 — 普通話核心詞語學習</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'PingFang SC', 'Heiti SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    background: #f5f5f5;
  }
  button { font-family: inherit; -webkit-tap-highlight-color: transparent; outline: none; }
  button:active { transform: scale(0.97); }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translateY(140px) scale(0.2) rotate(720deg); }
  }
  .page { min-height: 100vh; min-height: 100dvh; padding: 16px; max-width: 480px; margin: 0 auto; }
  .hidden { display: none !important; }
  .progress-bar { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .btn-back { background: white; border: none; border-radius: 10px; padding: 8px 14px; font-size: 14px; font-weight: 700; cursor: pointer; color: #666; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .quiz-option { background: white; border: 2.5px solid #e0e0e0; border-radius: 16px; padding: 16px 12px; cursor: pointer; text-align: center; transition: all 0.2s; }
  .quiz-option:disabled { cursor: default; }
  .quiz-option.correct { background: #D4EDDA; border-color: #28A745; }
  .quiz-option.correct .opt-pinyin { color: #155724; }
  .quiz-option.wrong { background: #F8D7DA; border-color: #DC3545; animation: shake 0.4s ease-in-out; }
  .quiz-option.wrong .opt-pinyin { color: #721C24; }
  .opt-pinyin { font-size: 22px; font-weight: 800; color: #333; }
  .opt-char { font-size: 14px; color: #999; margin-top: 4px; font-weight: 600; }
  .cat-card { background: white; border-radius: 16px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
  .cat-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .cat-info { display: flex; align-items: center; gap: 10px; }
  .cat-name { font-weight: 800; font-size: 16px; color: #333; }
  .cat-count { font-size: 11px; color: #999; margin-top: 1px; }
  .cat-btns { display: flex; gap: 6px; }
  .cat-btns button { border: none; border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; }
  #confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
  .confetti-piece { position: absolute; opacity: 0; animation: confettiFall 1s ease-out forwards; }
</style>
</head>
<body>
<div id="confetti-container" class="hidden"></div>
<div id="page-home" class="page" style="background:linear-gradient(145deg,#FFF9E6 0%,#FFE8F0 50%,#E8F4FF 100%);">
  <div style="text-align:center;padding:24px 0 16px;">
    <div style="font-size:48px;animation:float 3s ease-in-out infinite;">📚</div>
    <h1 style="font-size:28px;font-weight:900;background:linear-gradient(135deg,#FF6B6B,#E84393,#9B59B6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:8px 0 4px;">識字小天地</h1>
    <p style="font-size:13px;color:#888;font-weight:600;">普通話核心詞語學習</p>
    <div id="home-stars" class="hidden" style="display:inline-flex;align-items:center;gap:6px;background:#FFF3CD;border-radius:20px;padding:4px 14px;margin-top:8px;font-size:14px;font-weight:700;color:#B8860B;"></div>
  </div>
  <div id="cat-list" style="display:flex;flex-direction:column;gap:10px;margin-top:8px;"></div>
</div>
<div id="page-learn" class="page hidden">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <button class="btn-back" onclick="goHome()">← 返回</button>
    <div id="learn-cat-badge" style="background:white;border-radius:10px;padding:6px 14px;font-size:13px;font-weight:700;"></div>
    <div id="learn-counter" style="font-size:13px;font-weight:700;color:#999;"></div>
  </div>
  <div class="progress-bar"><div id="learn-progress" class="progress-fill"></div></div>
  <div id="learn-card" onclick="flipCard()" style="background:white;border-radius:24px;padding:32px 24px;text-align:center;cursor:pointer;min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;margin-bottom:20px;">
    <div id="learn-emoji" style="font-size:56px;margin-bottom:12px;"></div>
    <div id="learn-char" style="font-size:64px;font-weight:900;color:#333;line-height:1.2;margin-bottom:8px;"></div>
    <div id="learn-pinyin" class="hidden" style="font-size:24px;font-weight:600;margin-bottom:8px;"></div>
    <div style="position:absolute;bottom:12px;right:16px;font-size:11px;color:#ccc;font-weight:600;">👆 撳一下翻開</div>
  </div>
  <button id="learn-speak-btn" onclick="speakCurrent()" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;color:white;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:12px;">🔊 聽普通話發音</button>
  <div style="display:flex;gap:10px;">
    <button id="learn-prev" onclick="prevCard()" style="flex:1;padding:12px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;">← 上一個</button>
    <button id="learn-next" onclick="nextCard()" style="flex:1;padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;">下一個 →</button>
  </div>
  <button id="learn-quiz-cta" class="hidden" onclick="startQuizFromLearn()" style="width:100%;margin-top:12px;padding:14px;background:linear-gradient(135deg,#FFB347,#FF6B6B);color:white;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;animation:pulse 1.5s ease-in-out infinite;">🎯 開始測驗！</button>
</div>
<div id="page-quiz" class="page hidden">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <button class="btn-back" onclick="goHome()">← 返回</button>
    <div style="display:flex;gap:8px;">
      <div id="quiz-streak" class="hidden" style="background:#FF6B6B;color:white;border-radius:10px;padding:6px 12px;font-size:12px;font-weight:800;"></div>
      <div id="quiz-score" style="background:white;border-radius:10px;padding:6px 12px;font-size:13px;font-weight:700;color:#B8860B;"></div>
    </div>
  </div>
  <div class="progress-bar"><div id="quiz-progress" class="progress-fill" style="background:linear-gradient(90deg,#4ECDC4,#3498DB);"></div></div>
  <div style="text-align:center;margin-bottom:24px;">
    <div style="font-size:14px;color:#999;font-weight:600;margin-bottom:8px;">呢個字嘅普通話點讀？</div>
    <div style="background:white;border-radius:20px;padding:24px;display:inline-block;box-shadow:0 4px 20px rgba(0,0,0,0.08);">
      <div id="quiz-emoji" style="font-size:40px;margin-bottom:8px;"></div>
      <div id="quiz-char" style="font-size:56px;font-weight:900;color:#333;"></div>
    </div>
  </div>
  <div id="quiz-options" class="quiz-grid"></div>
  <div id="quiz-feedback" class="hidden" style="text-align:center;margin-top:16px;"></div>
</div>
<div id="page-results" class="page hidden" style="background:linear-gradient(160deg,#FFF9E6 0%,#FFE8F0 50%,#E8F4FF 100%);text-align:center;">
  <div style="padding:40px 0 20px;">
    <div id="result-icon" style="font-size:80px;"></div>
    <h2 id="result-msg" style="font-size:28px;font-weight:900;color:#333;margin-top:16px;"></h2>
  </div>
  <div style="background:white;border-radius:20px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,0.08);margin-bottom:20px;">
    <div id="result-score" style="font-size:48px;font-weight:900;"></div>
    <div id="result-detail" style="font-size:14px;color:#999;font-weight:600;margin-top:4px;"></div>
    <div id="result-stars" style="display:flex;justify-content:center;gap:4px;margin-top:12px;"></div>
  </div>
  <div style="display:flex;gap:10px;">
    <button id="result-retry" onclick="retryQuiz()" style="flex:1;padding:14px;color:white;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;">🔄 再試一次</button>
    <button onclick="goHome()" style="flex:1;padding:14px;background:white;color:#666;border:2px solid #ddd;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;">🏠 返回主頁</button>
  </div>
</div>
<script>
var CATEGORIES=[{name:"人物",emoji:"👨‍👩‍👧‍👦",color:"#FF6B6B",bg:"#FFF0F0",words:[{char:"人",pinyin:"rén"},{char:"你",pinyin:"nǐ"},{char:"他",pinyin:"tā"},{char:"她",pinyin:"tā"},{char:"家",pinyin:"jiā"},{char:"爸爸",pinyin:"bà ba"},{char:"媽媽",pinyin:"mā ma"},{char:"爺爺",pinyin:"yé ye"},{char:"奶奶",pinyin:"nǎi nai"}]},{name:"動物",emoji:"🐾",color:"#4ECDC4",bg:"#F0FFFE",words:[{char:"貓",pinyin:"māo"},{char:"狗",pinyin:"gǒu"},{char:"鳥",pinyin:"niǎo"},{char:"雞",pinyin:"jī"},{char:"魚",pinyin:"yú"},{char:"鼠",pinyin:"shǔ"},{char:"蟻",pinyin:"yǐ"},{char:"龍",pinyin:"lóng"},{char:"蟲",pinyin:"chóng"},{char:"蝴蝶",pinyin:"hú dié"}]},{name:"時間",emoji:"⏰",color:"#FFB347",bg:"#FFF8F0",words:[{char:"年",pinyin:"nián"},{char:"月",pinyin:"yuè"},{char:"早上",pinyin:"zǎo shang"},{char:"中午",pinyin:"zhōng wǔ"},{char:"下午",pinyin:"xià wǔ"},{char:"晚上",pinyin:"wǎn shang"},{char:"今天",pinyin:"jīn tiān"},{char:"明天",pinyin:"míng tiān"}]},{name:"地點",emoji:"📍",color:"#9B59B6",bg:"#F8F0FF",words:[{char:"公園",pinyin:"gōng yuán"},{char:"家",pinyin:"jiā"},{char:"學校",pinyin:"xué xiào"}]},{name:"動作",emoji:"🏃",color:"#3498DB",bg:"#F0F6FF",words:[{char:"吃",pinyin:"chī"},{char:"喜歡",pinyin:"xǐ huan"},{char:"看",pinyin:"kàn"},{char:"想",pinyin:"xiǎng"},{char:"畫",pinyin:"huà"},{char:"說話",pinyin:"shuō huà"},{char:"告訴",pinyin:"gào su"},{char:"跑步",pinyin:"pǎo bù"},{char:"跳高",pinyin:"tiào gāo"},{char:"踢球",pinyin:"tī qiú"},{char:"吃飯",pinyin:"chī fàn"},{char:"喝",pinyin:"hē"},{char:"水",pinyin:"shuǐ"},{char:"睡覺",pinyin:"shuì jiào"},{char:"笑",pinyin:"xiào"}]},{name:"食物",emoji:"🍱",color:"#E67E22",bg:"#FFF5EB",words:[{char:"米飯",pinyin:"mǐ fàn"},{char:"冰淇淋",pinyin:"bīng qí lín"},{char:"蘋果",pinyin:"píng guǒ"},{char:"麵條",pinyin:"miàn tiáo"},{char:"月餅",pinyin:"yuè bǐng"},{char:"青菜",pinyin:"qīng cài"}]},{name:"形容詞",emoji:"🌈",color:"#E84393",bg:"#FFF0F8",words:[{char:"開心",pinyin:"kāi xīn"},{char:"高興",pinyin:"gāo xìng"},{char:"生氣",pinyin:"shēng qì"},{char:"寒冷",pinyin:"hán lěng"},{char:"快",pinyin:"kuài"},{char:"慢",pinyin:"màn"},{char:"美麗",pinyin:"měi lì"},{char:"可愛",pinyin:"kě ài"}]}];
var EMOJIS={"人":"🧑","你":"👉","他":"👦","她":"👧","家":"🏠","爸爸":"👨","媽媽":"👩","爺爺":"👴","奶奶":"👵","貓":"🐱","狗":"🐕","鳥":"🐦","雞":"🐔","魚":"🐟","鼠":"🐭","蟻":"🐜","龍":"🐉","蟲":"🐛","蝴蝶":"🦋","年":"📅","月":"🌙","早上":"🌅","中午":"☀️","下午":"🌤️","晚上":"🌙","今天":"📆","明天":"➡️","公園":"🏞️","學校":"🏫","吃":"😋","喜歡":"❤️","看":"👀","想":"🤔","畫":"🎨","說話":"💬","告訴":"📢","跑步":"🏃","跳高":"🤸","踢球":"⚽","吃飯":"🍚","喝":"🥤","水":"💧","睡覺":"😴","笑":"😄","米飯":"🍚","冰淇淋":"🍦","蘋果":"🍎","麵條":"🍜","月餅":"🥮","青菜":"🥬","開心":"😊","高興":"😃","生氣":"😠","寒冷":"🥶","快":"⚡","慢":"🐢","美麗":"🌸","可愛":"🥰"};
var allWords=[];var i,j;for(i=0;i<CATEGORIES.length;i++){for(j=0;j<CATEGORIES[i].words.length;j++){allWords.push(CATEGORIES[i].words[j]);}}
var currentCat=null,cardIndex=0,flipped=false,quizWords=[],quizIndex=0,quizOptions=[],quizAnswered=false,score=0,streak=0,totalStars=0;
function $(id){return document.getElementById(id);}
function showPage(id){var pages=['page-home','page-learn','page-quiz','page-results'];for(var i=0;i<pages.length;i++){var el=$(pages[i]);if(pages[i]===id){el.classList.remove('hidden');}else{el.classList.add('hidden');}}window.scrollTo(0,0);}
function speak(text){if(window.speechSynthesis){window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.rate=0.7;u.pitch=1.1;window.speechSynthesis.speak(u);}}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function fireConfetti(){var c=$('confetti-container');c.innerHTML='';c.classList.remove('hidden');var colors=['#FF6B6B','#4ECDC4','#FFB347','#9B59B6','#3498DB','#E84393','#2ECC71'];for(var i=0;i<28;i++){var p=document.createElement('div');p.className='confetti-piece';var s=Math.random()*8+4;p.style.left=Math.random()*100+'%';p.style.top=(Math.random()*40+10)+'%';p.style.width=s+'px';p.style.height=s+'px';p.style.backgroundColor=colors[i%7];p.style.borderRadius=Math.random()>0.5?'50%':'2px';p.style.animationDelay=(Math.random()*0.3)+'s';p.style.transform='rotate('+(Math.random()*360)+'deg)';c.appendChild(p);}setTimeout(function(){c.classList.add('hidden');c.innerHTML='';},1400);}
function renderHome(){if(totalStars>0){$('home-stars').classList.remove('hidden');$('home-stars').style.display='inline-flex';$('home-stars').innerHTML='⭐ '+totalStars+' 顆星星';}var list=$('cat-list');list.innerHTML='';for(var i=0;i<CATEGORIES.length;i++){(function(cat,idx){var div=document.createElement('div');div.className='cat-card';div.style.boxShadow='0 2px 12px '+cat.color+'22';div.style.border='2px solid '+cat.color+'33';div.style.animation='popIn 0.4s ease-out '+(idx*0.06)+'s both';var info=document.createElement('div');info.className='cat-info';info.innerHTML='<div class="cat-icon" style="background:'+cat.bg+'">'+cat.emoji+'</div><div><div class="cat-name">'+cat.name+'</div><div class="cat-count">'+cat.words.length+' 個詞語</div></div>';var btns=document.createElement('div');btns.className='cat-btns';var lb=document.createElement('button');lb.textContent='學';lb.style.background=cat.color;lb.style.color='white';lb.onclick=function(){startLearn(idx);};var qb=document.createElement('button');qb.textContent='考';qb.style.background='white';qb.style.color=cat.color;qb.style.border='2px solid '+cat.color;qb.onclick=function(){startQuiz(idx);};btns.appendChild(lb);btns.appendChild(qb);div.appendChild(info);div.appendChild(btns);list.appendChild(div);})(CATEGORIES[i],i);}showPage('page-home');}
function goHome(){renderHome();}
function startLearn(idx){currentCat=CATEGORIES[idx];cardIndex=0;flipped=false;renderLearnCard();showPage('page-learn');}
function renderLearnCard(){var cat=currentCat;var word=cat.words[cardIndex];var emoji=EMOJIS[word.char]||'📝';$('page-learn').style.background='linear-gradient(160deg,'+cat.bg+' 0%,white 100%)';$('learn-cat-badge').textContent=cat.emoji+' '+cat.name;$('learn-cat-badge').style.color=cat.color;$('learn-counter').textContent=(cardIndex+1)+'/'+cat.words.length;$('learn-progress').style.width=((cardIndex+1)/cat.words.length*100)+'%';$('learn-progress').style.background=cat.color;var card=$('learn-card');card.style.boxShadow='0 8px 32px '+cat.color+'22';card.style.border='3px solid '+cat.color+'33';card.style.animation='none';void card.offsetHeight;card.style.animation='bounceIn 0.5s ease-out';$('learn-emoji').textContent=emoji;$('learn-char').textContent=word.char;$('learn-pinyin').textContent=word.pinyin;$('learn-pinyin').style.color=cat.color;$('learn-pinyin').classList.add('hidden');flipped=false;$('learn-speak-btn').style.background=cat.color;var prev=$('learn-prev');prev.disabled=cardIndex===0;prev.style.background=cardIndex===0?'#eee':'white';prev.style.border='2px solid '+(cardIndex===0?'#ddd':cat.color);prev.style.color=cardIndex===0?'#ccc':cat.color;var next=$('learn-next');var isLast=cardIndex===cat.words.length-1;next.disabled=isLast;next.style.background=isLast?'#eee':cat.color;next.style.color=isLast?'#ccc':'white';if(isLast){$('learn-quiz-cta').classList.remove('hidden');}else{$('learn-quiz-cta').classList.add('hidden');}}
function flipCard(){flipped=!flipped;if(flipped){$('learn-pinyin').classList.remove('hidden');$('learn-pinyin').style.animation='bounceIn 0.3s ease-out';}else{$('learn-pinyin').classList.add('hidden');}speak(currentCat.words[cardIndex].char);}
function speakCurrent(){speak(currentCat.words[cardIndex].char);}
function prevCard(){if(cardIndex>0){cardIndex--;renderLearnCard();}}
function nextCard(){if(cardIndex<currentCat.words.length-1){cardIndex++;renderLearnCard();}}
function startQuizFromLearn(){for(var i=0;i<CATEGORIES.length;i++){if(CATEGORIES[i].name===currentCat.name){startQuiz(i);return;}}}
function startQuiz(idx){currentCat=CATEGORIES[idx];quizWords=shuffle(currentCat.words).slice(0,Math.min(currentCat.words.length,6));quizIndex=0;score=0;streak=0;quizAnswered=false;generateQuizOptions();renderQuiz();showPage('page-quiz');}
function generateQuizOptions(){var correct=quizWords[quizIndex];var others=[];for(var i=0;i<allWords.length;i++){if(allWords[i].char!==correct.char)others.push(allWords[i]);}others=shuffle(others).slice(0,3);quizOptions=shuffle(others.concat([correct]));}
function renderQuiz(){var cat=currentCat;var word=quizWords[quizIndex];$('page-quiz').style.background='linear-gradient(160deg,#FFF9E6 0%,'+cat.bg+' 100%)';$('quiz-progress').style.width=((quizIndex+1)/quizWords.length*100)+'%';$('quiz-score').textContent='⭐ '+score+'/'+quizWords.length;if(streak>=2){$('quiz-streak').classList.remove('hidden');$('quiz-streak').textContent='🔥 '+streak+' 連中';}else{$('quiz-streak').classList.add('hidden');}$('quiz-emoji').textContent=EMOJIS[word.char]||'📝';$('quiz-char').textContent=word.char;var grid=$('quiz-options');grid.innerHTML='';for(var i=0;i<quizOptions.length;i++){(function(opt,idx){var btn=document.createElement('button');btn.className='quiz-option';btn.style.animation='popIn 0.3s ease-out '+(idx*0.05)+'s both';btn.innerHTML='<div class="opt-pinyin">'+opt.pinyin+'</div><div class="opt-char">'+opt.char+'</div>';btn.onclick=function(){handleQuizAnswer(opt,btn);};grid.appendChild(btn);})(quizOptions[i],i);}$('quiz-feedback').classList.add('hidden');quizAnswered=false;}
function handleQuizAnswer(opt,btn){if(quizAnswered)return;quizAnswered=true;var correct=quizWords[quizIndex];var isCorrect=opt.char===correct.char;var buttons=$('quiz-options').querySelectorAll('button');for(var i=0;i<buttons.length;i++){buttons[i].disabled=true;var bChar=buttons[i].querySelector('.opt-char').textContent;if(bChar===correct.char)buttons[i].classList.add('correct');}if(!isCorrect)btn.classList.add('wrong');if(isCorrect){score++;streak++;fireConfetti();speak(correct.char);var msgs=['太棒了！🎉','好叻！👏','答啱咗！✨','勁呀！🌟'];$('quiz-feedback').innerHTML='<div style="font-size:18px;font-weight:800;color:#28A745;animation:popIn 0.3s ease-out">'+msgs[Math.floor(Math.random()*4)]+'</div>';}else{streak=0;$('quiz-feedback').innerHTML='<div style="font-size:16px;font-weight:700;color:#DC3545;animation:popIn 0.3s ease-out">正確答案係：'+correct.pinyin+'</div><button onclick="speak(\''+correct.char+'\')" style="margin-top:8px;background:#DC3545;color:white;border:none;border-radius:10px;padding:8px 16px;font-size:14px;font-weight:700;cursor:pointer;">🔊 聽正確發音</button>';}$('quiz-feedback').classList.remove('hidden');setTimeout(function(){if(quizIndex+1<quizWords.length){quizIndex++;generateQuizOptions();renderQuiz();}else{totalStars+=score;showResults();}},1600);}
function showResults(){var cat=currentCat;var pct=Math.round(score/quizWords.length*100);var icon=pct===100?'🏆':pct>=70?'🌟':'📖';var msg=pct===100?'滿分！你好叻！🏆':pct>=70?'做得好！繼續努力！💪':'加油！再試多次！📖';$('result-icon').textContent=icon;$('result-icon').style.animation='bounceIn 0.6s ease-out, float 3s ease-in-out 0.6s infinite';$('result-msg').textContent=msg;$('result-msg').style.animation='bounceIn 0.6s ease-out 0.2s both';$('result-score').textContent=score+'/'+quizWords.length;$('result-score').style.color=cat.color;$('result-detail').textContent='答對 '+score+' 題 · 獲得 ⭐'+score+' 顆星星';$('result-retry').style.background=cat.color;var stars=$('result-stars');stars.innerHTML='';for(var i=0;i<quizWords.length;i++){var d=document.createElement('div');d.style.cssText='width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;background:'+(i<score?'#FFD700':'#eee');d.textContent=i<score?'⭐':'○';stars.appendChild(d);}showPage('page-results');}
function retryQuiz(){for(var i=0;i<CATEGORIES.length;i++){if(CATEGORIES[i].name===currentCat.name){startQuiz(i);return;}}}
renderHome();
</script>
